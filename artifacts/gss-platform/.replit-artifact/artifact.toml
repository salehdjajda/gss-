kind = "web"
previewPath = "/"
title = "GSS Platform"
version = "1.0.0"
id = "artifacts/gss-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22504

[services.development]
run = "pnpm --filter @workspace/gss-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gss-platform", "run", "build" ]
publicDir = "artifacts/gss-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22504"
BASE_PATH = "/"
